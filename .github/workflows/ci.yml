name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ["22"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npx tsc --noEmit -p tsconfig.test.json
      - run: npm run lint
      - run: npm run build
      - name: Doctor — fail on stale rule anchors
        run: node dist/cli.js doctor
      - run: npm test

  pack-smoke:
    name: pack-smoke (npm pack + global install)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "22", cache: npm }
      - run: npm ci
      - run: npm run build
      - run: npm pack
      - name: Install the tarball globally and run both bin aliases
        run: |
          TARBALL=$(ls claude-cowork-lint-*.tgz)
          npm i -g "./$TARBALL"
          claude-cowork-lint --version
          cwlint --version
          claude-cowork-lint list-rules | wc -l   # 11
          claude-cowork-lint check . --strict     # repo dogfoods clean

  coverage:
    name: coverage (enforces vitest thresholds)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "22", cache: npm }
      - run: npm ci
      - run: npm run coverage
