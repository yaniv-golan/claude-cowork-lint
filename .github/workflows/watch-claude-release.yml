name: watch-claude-release

# v0.3 — runs the extractor end-to-end against the synthetic fixtures
# shipped in the repo (since we can't install Claude.app inside GitHub
# Actions). When wired against a real macOS runner with Claude.app
# installed, swap `--bundle` to `--app /Applications/Claude.app`.

on:
  schedule:
    - cron: "0 7 * * *"  # daily at 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: watch-claude-release
  cancel-in-progress: false

jobs:
  check:
    if: github.repository == 'yaniv-golan/claude-cowork-lint'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv python install 3.12
      - run: uv sync --all-extras --frozen
      - name: Run extractor pipeline against synthetic fixtures
        run: |
          uv run python scripts/check_for_new_release.py \
            --bundle tests/fixtures/bundles/synthetic_desktop.js \
            --cli-bundle tests/fixtures/bundles/synthetic_cli.js \
            --output-dir watcher-output \
            --report report.json
      - name: Upload report + candidate contract
        uses: actions/upload-artifact@v4
        with:
          name: watcher-output
          path: |
            report.json
            watcher-output/
          retention-days: 14
