name: watch-claude-release

# v0.3 STUB — wired up but does not yet auto-PR.
# It runs the watcher script in dry-run mode and uploads the report as an artifact
# so a maintainer can decide whether to extract.

on:
  schedule:
    - cron: "0 7 * * *"  # daily at 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: watch-claude-release
  cancel-in-progress: false

jobs:
  check:
    if: github.repository == 'yaniv-golan/claude-cowork-lint'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv python install 3.12
      - run: uv sync --all-extras --frozen
      - name: Check for new Claude.app release (dry-run)
        run: uv run python scripts/check_for_new_release.py --dry-run --report report.json
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: watcher-report
          path: report.json
          retention-days: 14
