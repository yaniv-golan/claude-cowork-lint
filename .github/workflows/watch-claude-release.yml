name: watch-claude-release

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions: { contents: read }

concurrency:
  group: watch-claude-release
  cancel-in-progress: false

jobs:
  check:
    if: github.repository == 'yaniv-golan/claude-cowork-lint'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "22", cache: npm }
      - run: npm ci
      - run: npm run build
      - name: Run watcher (synthetic fixtures in CI; real Claude.app only on macOS host)
        env:
          NODE_OPTIONS: "--max-old-space-size=3072"
        run: |
          npx tsx scripts/check-for-new-release.ts \
            --bundle test/fixtures/bundles/synthetic-desktop.js \
            --cli-bundle test/fixtures/bundles/synthetic-cli.js \
            --output-dir watcher-output \
            --report report.json
      - uses: actions/upload-artifact@v7
        with:
          name: watcher-output
          path: |
            report.json
            watcher-output/
          retention-days: 14
